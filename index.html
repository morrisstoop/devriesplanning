function parseTimeToHours(timeStr) {
  if (!timeStr) return null;
  const [h,m] = timeStr.split(':').map(Number);
  return h + m/60;
}

function analyzeKlusOptimality(klus, person, dayKlussen, allPersonRows) {
  if (!klus.o || klus.o === 0) return { optimal: true };
  const coords = wpGetCityCoords(klus.pl);
  if (!coords) return { optimal: true };
  
  const afstand = wpDistKm(HW.lat, HW.lon, coords.la, coords.lo);
  const isDTD = false;
  
  // Current marge (eigen) - use klus type if available
  const eigenM = wpCalcEigenMarge(klus.o, klus.pl, '', isDTD, klus.m2 || 80, '', 0, 0);
  if (!eigenM || isNaN(eigenM.marge)) return { optimal: true };
  
  // OA marge
  const oaM = (klus.o && klus.o > 0) ? wpCalcOaMarge(klus.o, isDTD) : null;
  const oaBetter = oaM && !isNaN(oaM.marge) && oaM.marge > eigenM.marge;
  const oaDiff = (oaM && !isNaN(oaM.marge)) ? oaM.marge - eigenM.marge : 0;
  
  // Check combo: find other days where a team finishes nearby WITH TIME CHECK
  let bestCombo = null;
  const klusDuur = eigenM.normtijd || 3; // estimated hours for this klus
  const today = new Date(2026, 2, 6);
  
  for (let dayOff = 0; dayOff < 28; dayOff++) {
    const checkDate = new Date(today);
    checkDate.setDate(checkDate.getDate() + dayOff);
    if (checkDate.getDay() === 0 || checkDate.getDay() === 6) continue;
    const ds = wpFmtDate(checkDate);
    
    const otherKlussen = PLAN_DATA.filter(p => p.sta === 'G' && p.gb && p.gb.split(' ')[0] === ds && p.cd !== klus.cd);
    for (const other of otherKlussen) {
      const oc = wpGetCityCoords(other.pl);
      if (!oc) continue;
      const comboDist = wpDistKm(coords.la, coords.lo, oc.la, oc.lo);
      if (comboDist > 25) continue; // too far apart
      
      // TIME CHECK: does this klus fit after the other one?
      const otherEnd = parseTimeToHours(wpParseTime(other.ge));
      if (!otherEnd) continue;
      
      const travelHours = comboDist * WP_RIJFACTOR / WP_SNELHEID;
      const startNewKlus = otherEnd + travelHours;
      const endNewKlus = startNewKlus + klusDuur;
      const travelBack = wpDistKm(coords.la, coords.lo, HW.lat, HW.lon) * WP_RIJFACTOR / WP_SNELHEID;
      const endDay = endNewKlus + travelBack + CONFIG.loodstijd_uur; // + loods
      
      if (endDay > 18) continue; // PAST NIET — skip
      
      // Also check: does the other team have room? (not already 2+ klussen)
      const teamDayKlussen = PLAN_DATA.filter(p => p.sta === 'G' && p.mw === other.mw && p.gb && p.gb.split(' ')[0] === ds);
      if (teamDayKlussen.length >= 2) continue; // team already full
      
      // Calculate saved marge
      const savedKm = afstand * WP_RIJFACTOR * WP_T;
      const savedMarge = savedKm * CONFIG.brandstof_per_km + (savedKm / WP_SNELHEID) * WP_UURTARIEF;
      const comboMarge = eigenM.marge + savedMarge * 0.5;
      
      if (!bestCombo || comboMarge > bestCombo.marge) {
        bestCombo = {
          marge: comboMarge,
          savedMarge: savedMarge * 0.5,
          team: other.mw,
          dag: WP_DAYS[checkDate.getDay()] + ' ' + checkDate.getDate() + ' ' + WP_MONTHS[checkDate.getMonth()],
          plaats: other.pl,
          comboDist: comboDist,
          startTijd: Math.floor(startNewKlus) + ':' + String(Math.round((startNewKlus%1)*60)).padStart(2,'0'),
          eindTijd: Math.floor(endNewKlus) + ':' + String(Math.round((endNewKlus%1)*60)).padStart(2,'0'),
          eindDag: Math.floor(endDay) + ':' + String(Math.round((endDay%1)*60)).padStart(2,'0'),
        };
      }
    }
  }
  
  const comboBetter = bestCombo && bestCombo.savedMarge > 20;
  // Check if this is the only klus for the team on this day
  const teamKlussen = dayKlussen.filter(dk => dk.mw === klus.mw);
  const soloTrip = teamKlussen.length === 1 && afstand > 40;
  
  const isSuboptimal = oaBetter || comboBetter || (soloTrip && afstand > 50);
  if (!isSuboptimal) return { optimal: true };
  
  const reasons = [];
  if (oaBetter) {
    reasons.push({ type:'oa', text:`OA levert €${Math.round(oaDiff)} meer marge`, currentMarge:eigenM.marge, oaMarge:oaM.marge, diff:oaDiff });
  }
  if (comboBetter) {
    reasons.push({ type:'combo', text:`Combineer met ${bestCombo.plaats} (${bestCombo.dag}), bespaart ~€${Math.round(bestCombo.savedMarge)}`, suggestion:bestCombo });
  }
  if (soloTrip && afstand > 60 && !oaBetter) {
    reasons.push({ type:'solo', text:`Solo-rit ${Math.round(afstand)} km — hoge reiskosten` });
  }
  
  return { optimal:false, reasons, eigenMarge:eigenM?eigenM.marge:null, eigenPct:eigenM?eigenM.margePct:null, oaMarge:oaM?oaM.marge:null, oaPct:oaM?oaM.margePct:null, afstand, bestCombo, klus, breakdown:eigenM };
}

      <div class="gp-row"><span class="gp-label">Schouwcommissie (${(CONFIG.schouw_commissie*100).toFixed(1)}%)</span><span class="gp-val" style="color:#ff4757;">-${wpEur(schouwComm)}</span></div>
      <div class="gp-row"><span class="gp-label">Materiaal (~${Math.round(matPct*100)}%)</span><span class="gp-val" style="color:#ff4757;">-${wpEur(materiaal)}</span></div>
      <div class="gp-row"><span class="gp-label">Personeel uitvoer (~${normtijd.toFixed(1)}u × €${CONFIG.uurtarief})</span><span class="gp-val" style="color:#ff4757;">-${wpEur(persUitvoer)}</span></div>
      <div class="gp-row"><span class="gp-label">Personeel reis (${reisUren.toFixed(1)}u × €${CONFIG.uurtarief})</span><span class="gp-val" style="color:#ff4757;">-${wpEur(persReis)}</span></div>
      <div class="gp-row"><span class="gp-label">Brandstof (${reisKm.toFixed(0)} km × €${CONFIG.brandstof_per_km})</span><span class="gp-val" style="color:#ff4757;">-${wpEur(reisKosten)}</span></div>
      <div class="gp-row"><span class="gp-label">Loodstijd (2×${CONFIG.loodstijd_uur}u)</span><span class="gp-val" style="color:#ff4757;">-${wpEur(loodstijd)}</span></div>
      <div class="gp-row"><span class="gp-label">Kostenmarge (${(CONFIG.kostenmarge_pct*100).toFixed(0)}%)</span><span class="gp-val" style="color:#ff4757;">-${wpEur(kosten5)}</span></div>
      <div style="border-top:1px solid #3a3e52;margin-top:6px;padding-top:6px;">
        <div class="gp-row"><span class="gp-label" style="font-weight:700;color:#fff;">Geschatte marge (eigen)</span><span class="gp-val" style="color:${eigMarge>=0?'#2ed573':'#ff4757'};font-size:15px;">${wpEur(eigMarge)} (${eigPct}%)</span></div>
      </div>
    `;
    
    // OA vergelijking
    oaHtml = `
      <div style="border-top:2px solid #f368e0;margin-top:10px;padding-top:8px;">
        <div style="font-size:11px;font-weight:700;color:#f368e0;margin-bottom:6px;">ONDERAANNEMER VERGELIJKING</div>
        <div class="gp-row"><span class="gp-label">OA kosten (gem. ${(CONFIG.oa_kostprijs_pct*100).toFixed(1)}%)</span><span class="gp-val" style="color:#ff4757;">-${wpEur(oaKosten)}</span></div>
        <div class="gp-row"><span class="gp-label">Schouwcommissie</span><span class="gp-val" style="color:#ff4757;">-${wpEur(schouwComm)}</span></div>
        <div class="gp-row"><span class="gp-label" style="font-weight:700;color:#f368e0;">Marge via OA</span><span class="gp-val" style="color:#f368e0;">${wpEur(oaMarge)} (${oaPct}%)</span></div>
        <div style="margin-top:6px;padding:6px 8px;border-radius:6px;background:${oaBeter?'rgba(255,71,87,0.15)':'rgba(46,213,115,0.15)'};">
          <div style="font-size:11px;font-weight:700;color:${oaBeter?'#ff4757':'#2ed573'};">${oaBeter?'⚠ OA levert €'+Math.round(oaMarge-eigMarge)+' MEER marge':'✓ Eigen uitvoering is rendabeler (+€'+Math.round(eigMarge-oaMarge)+')'}</div>
        </div>
        ${oaRanking.length > 0 ? `
        <div style="margin-top:8px;">
          <div style="font-size:10px;font-weight:700;color:#f368e0;margin-bottom:6px;">★ BESTE ONDERAANNEMER (op afstand)</div>
          ${oaRanking.map((oa, i) => `
            <div style="padding:6px 8px;border-radius:6px;background:#252940;border-left:3px solid ${oa.kleur};margin-bottom:4px;${i===0?'border:1px solid '+oa.kleur+';':'opacity:0.7;'}">
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="font-size:11px;font-weight:700;color:${oa.kleur};">${i===0?'★ ':''}<span style="color:${oa.kleur}">${oa.name}</span></span>
                <span style="font-size:10px;color:#4dabf7;font-weight:600;">${oa.dist.toFixed(0)} km</span>
              </div>
              <div style="font-size:9px;color:#888;">${oa.plaats}</div>
            </div>
          `).join('')}
          <div style="font-size:9px;color:#666;margin-top:4px;">Afstand HW→klus (eigen team): ${dist.toFixed(0)} km</div>
        </div>` : ''}
      </div>
    `;
    
    if (oaBeter) { isSubopt = true; suboptReasons.push('OA is rendabeler'); }
    
    // Combo suggestie
    if (co) {
      const teamDayK = dayKlussen.filter(dk => dk.mw === k.mw);
      if (teamDayK.length === 1 && dist > 40) {
        // Look for combo opportunities
        let bestCombo = null;
        const today = new Date(2026, 2, 6);
        for (let d = 0; d < 28; d++) {
          const cd = new Date(today); cd.setDate(cd.getDate()+d);
          if (cd.getDay()===0||cd.getDay()===6) continue;
          const ds = wpFmtDate(cd);
          const others = PLAN_DATA.filter(p => p.sta==='G' && p.gb && p.gb.split(' ')[0]===ds && p.cd!==k.cd);
          for (const ot of others) {
            const oc = wpGetCityCoords(ot.pl);
            if (!oc) continue;
            const cDist = wpDistKm(co.la, co.lo, oc.la, oc.lo);
            if (cDist > 25) continue;
            const otEnd = parseTimeToHours(wpParseTime(ot.ge));
            if (!otEnd) continue;
            const travelH = cDist*CONFIG.rijfactor/CONFIG.snelheid;
            const endNew = otEnd + travelH + normtijd;
            const backH = wpDistKm(co.la,co.lo,HW.lat,HW.lon)*CONFIG.rijfactor/CONFIG.snelheid;
            if (endNew + backH + CONFIG.loodstijd_uur > 18) continue;
            const teamDayOt = PLAN_DATA.filter(p=>p.sta==='G'&&p.mw===ot.mw&&p.gb&&p.gb.split(' ')[0]===ds);
            if (teamDayOt.length >= 2) continue;
            const savedKm = dist*CONFIG.rijfactor*CONFIG.t_factor;
            const saved = savedKm*CONFIG.brandstof_per_km + (savedKm/CONFIG.snelheid)*CONFIG.uurtarief;
            if (!bestCombo || saved > bestCombo.saved) {
              bestCombo = {
                saved, plaats:ot.pl, team:ot.mw, cDist,
                dag: WP_DAYS[cd.getDay()]+' '+cd.getDate()+' '+WP_MONTHS[cd.getMonth()],
                start: Math.floor(otEnd+travelH)+':'+String(Math.round(((otEnd+travelH)%1)*60)).padStart(2,'0'),
                eind: Math.floor(endNew)+':'+String(Math.round((endNew%1)*60)).padStart(2,'0'),
              };
            }
          }
        }
        if (bestCombo && bestCombo.saved > 20) {
          isSubopt = true;
          suboptReasons.push('Combineerbaar');
          suggestieHtml = `
            <div style="border-top:2px solid #2ed573;margin-top:10px;padding-top:8px;">
              <div style="font-size:11px;font-weight:700;color:#2ed573;margin-bottom:6px;">★ BETERE OPTIE: COMBINEREN</div>
              <div style="background:#252940;border-radius:8px;padding:10px;border-left:3px solid #2ed573;">
                <div style="font-size:13px;font-weight:700;color:#fff;">Verplaats naar ${bestCombo.dag}</div>
                <div class="gp-row"><span class="gp-label">Combineer met klus in</span><span class="gp-val" style="color:#4dabf7;">${bestCombo.plaats}</span></div>
                <div class="gp-row"><span class="gp-label">Team ter plekke</span><span class="gp-val">${wpShortTeam(bestCombo.team)}</span></div>
                <div class="gp-row"><span class="gp-label">Afstand ertussen</span><span class="gp-val">${bestCombo.cDist.toFixed(0)} km</span></div>
                <div class="gp-row"><span class="gp-label">Start klus</span><span class="gp-val" style="color:#4dabf7;">${bestCombo.start}</span></div>
                <div class="gp-row"><span class="gp-label">Klaar om</span><span class="gp-val" style="color:#4dabf7;">${bestCombo.eind}</span></div>
                <div class="gp-row"><span class="gp-label">Geschatte besparing</span><span class="gp-val" style="color:#2ed573;">~${wpEur(bestCombo.saved)}</span></div>
              </div>
            </div>
          `;
        }
      }
    }
  }
  
  // Build popup
  const overlay = document.createElement('div');
  overlay.className = 'gantt-popup-overlay';
  overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
  
  overlay.innerHTML = `<div class="gantt-popup" style="position:relative;">
    <button class="gp-close" onclick="this.closest('.gantt-popup-overlay').remove()">✕</button>
    <div class="gp-title">${k.kl}</div>
    <div style="font-size:11px;color:#888;margin-bottom:4px;">${k.st} ${k.nr}, ${k.pc} ${k.pl}</div>
    
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin:8px 0;">
      <span style="background:#252940;padding:3px 8px;border-radius:4px;font-size:10px;color:#4dabf7;">${wpShortTeam(k.mw)}</span>
      ${k.tp ? '<span style="background:#252940;padding:3px 8px;border-radius:4px;font-size:10px;color:#e8712a;">'+k.tp+'</span>' : ''}
      ${k.m2 ? '<span style="background:#252940;padding:3px 8px;border-radius:4px;font-size:10px;color:#2ed573;">'+k.m2+' m²</span>' : ''}
      ${k.gb ? '<span style="background:#252940;padding:3px 8px;border-radius:4px;font-size:10px;color:#888;">'+wpParseTime(k.gb)+'–'+wpParseTime(k.ge)+'</span>' : ''}
      ${isSubopt ? '<span style="background:#ff4757;padding:3px 8px;border-radius:4px;font-size:10px;color:#fff;font-weight:700;">⚠ NIET OPTIMAAL</span>' : '<span style="background:#2ed573;padding:3px 8px;border-radius:4px;font-size:10px;color:#fff;font-weight:700;">✓ OK</span>'}
    </div>
    
    ${(k.hg||k.sd||k.vl||k.wa||k.wh) ? '<div style="background:#252940;border-radius:6px;padding:8px 10px;margin:6px 0;font-size:11px;color:#bbb;line-height:1.6;">'
      +(k.hg?'<div>📐 Kruipruimte: <b style="color:#fff;">'+k.hg+' cm</b></div>':'')
      +(k.sd?'<div>📐 Spouwdiepte: <b style="color:#fff;">'+k.sd+' cm</b></div>':'')
      +(k.vl?'<div>🏠 Vloertype: <b style="color:#fff;">'+k.vl+'</b></div>':'')
      +(k.wa?'<div>💧 Grondwater: <b style="color:#fff;">'+k.wa+'</b></div>':'')
      +(k.wh?'<div>📏 Max werkhoogte: <b style="color:#fff;">'+k.wh+'m</b></div>':'')
      +'</div>' : ''}
    
    ${k.nt ? '<div style="background:rgba(255,165,2,0.1);border:1px solid rgba(255,165,2,0.3);border-radius:6px;padding:8px 10px;margin:6px 0;font-size:11px;color:#ffa502;line-height:1.5;">📝 '+k.nt+'</div>' : ''}
    
    ${k.lk ? '<a href="'+k.lk+'" target="_blank" style="font-size:10px;color:#4dabf7;text-decoration:underline;display:inline-block;margin-bottom:8px;">Open in Splandid ↗</a>' : ''}
    
    <div style="font-size:10px;font-weight:700;color:#e8712a;text-transform:uppercase;letter-spacing:0.5px;margin:8px 0 6px;">Marge-analyse</div>
    ${margeHtml}
    ${oaHtml}
    ${suggestieHtml}
  </div>`;
  
  document.body.appendChild(overlay);
}


let currentDay = new Date(2026, 2, 9); // Start on Monday March 9

function buildPlannerMain() {
  window._ganttKlussen = [];
  const main = document.getElementById('plannerMain');
  const dateStr = wpFmtDate(currentDay);
  const dayName = ['Zondag','Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag'][currentDay.getDay()];
  
  // Get klussen for this day
  const dayKlussen = PLAN_DATA.filter(p => p.sta === 'G' && p.gb && p.gb.split(' ')[0] === dateStr);
  const dayOmzet = dayKlussen.reduce((a,k) => a + k.o, 0);
  
  // All known persons (hardcoded from Splandid export)
  const ALL_PERSONS = [
    'Umut Adem Arpacay','Mehmet Akin',
    'Nazar Melnyk','Bohdan Chaban',
    'Lukas Stolarski','Mariusz Zięba-Spalek',
    'Tom Sahetapy','Emy Straatman',
    'Patryk Krolik','Tomasz Swiderski',
    'Janairo Dundas','Dyllan Babel',
    'Kamil Puchalski','Denys Dunaiev',
    'Youri Klijssen','Talha Unal','Mike Verhoeve',
    'Dominic Verstraaten','Roemer Schuurman',
    'Roy Vd Bosch','Marvin Abraham Marcus Pattipawaej',
    'Deac Ovidiu Vasile','Roman Tsiurus','Vitaliy Porokhnyak',
    'Lauren van der Lei','Mateusz Janicki',
    'Krzystof Szkola','Andrzej Szkola',
    'Maison Maison','Michal Kaczmarek','Damian Wenerski',
    'Gokhan Ozdemir','Giovani Dammers',
    'Alain Dennis Esveld','Andriy Protsiuk',
    'Robin Samson-It',
    ...OA_LOCS.map(oa => oa.splandid),
  ];

  // Explode klussen per individual person
  const personRows = {};
  ALL_PERSONS.forEach(p => { personRows[p] = []; });
  
  dayKlussen.forEach(k => {
    const people = k.mw ? k.mw.split(',').map(p => p.trim()).filter(Boolean) : [];
    people.forEach(person => {
      if (!personRows[person]) { personRows[person] = []; }
      personRows[person].push(k);
    });
  });
  
  // Apply team filter
  let filteredPersons = ALL_PERSONS;
  if (wpTeamFilter) {
    const teamPeople = new Set();
    PLAN_DATA.filter(p => p.mw === wpTeamFilter).forEach(k => {
      k.mw.split(',').map(p => p.trim()).filter(Boolean).forEach(p => teamPeople.add(p));
    });
    filteredPersons = ALL_PERSONS.filter(p => teamPeople.has(p));
  }
  
  // Time range: 07:00 - 18:00
  const START_H = 7, END_H = 18;
  const HOURS = END_H - START_H;
  
  function timeToFrac(timeStr) {
    if (!timeStr) return 0;
    const [h,m] = timeStr.split(':').map(Number);
    return Math.max(0, Math.min(1, (h + m/60 - START_H) / HOURS));
  }
  
  // Color per klus type
  function barColor(tp, isOA) {
    if (isOA) return '#f368e0';
    if (tp === 'Bodem' || tp === 'Vloer') return '#e8712a';
    if (tp === 'Spouw') return '#e8712a';
    if (tp === 'Dak') return '#ffa502';
    if (tp === 'Plafond') return '#4dabf7';
    return '#e8712a';
  }
  
  // Build week day buttons
  const weekStart = wpGetMonday(currentDay);
  let dayBtns = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart); d.setDate(d.getDate() + i);
    const ds = wpFmtDate(d);
    const isActive = ds === dateStr;
    const hasKlus = PLAN_DATA.some(p => p.sta === 'G' && p.gb && p.gb.split(' ')[0] === ds);
    const dn = WP_DAYS[d.getDay()];
    dayBtns += `<button class="day-nav-btn ${isActive?'active':''}" data-date="${ds}" data-y="${d.getFullYear()}" data-m="${d.getMonth()}" data-d="${d.getDate()}">${dn} ${d.getDate()}${hasKlus?' ●':''}</button>`;
  }
  
  // Hour headers
  let hourHeaders = '<th class="name-col">Medewerker</th>';
  for (let h = START_H; h <= END_H; h++) {
    hourHeaders += `<th style="width:${100/HOURS}%;text-align:left;">${String(h).padStart(2,'0')}:00</th>`;
  }
  
  // Person rows
  let rowsHtml = '';
  filteredPersons.forEach(person => {
    const klussen = personRows[person];
    let barsHtml = '';
    
    // Hour grid lines
    for (let h = START_H; h <= END_H; h++) {
      const left = ((h - START_H) / HOURS * 100).toFixed(2);
      barsHtml += `<div class="gantt-hour-line" style="left:${left}%;"></div>`;
    }
    
    klussen.forEach((k, ki) => {
      const startTime = wpParseTime(k.gb);
      const endTime = wpParseTime(k.ge);
      const left = (timeToFrac(startTime) * 100).toFixed(2);
      const width = ((timeToFrac(endTime) - timeToFrac(startTime)) * 100).toFixed(2);
      const isOA = k.mw && OA_LOCS.some(oa => k.mw.toLowerCase().includes(oa.splandid.toLowerCase()) || oa.splandid.toLowerCase().includes(k.mw.toLowerCase()));
      const bg = barColor(k.tp, isOA);
      
      // Store klus for popup
      const klusIdx = window._ganttKlussen.length;
      window._ganttKlussen.push({ klus: k, person, dayKlussen, personRows });
      
      // Quick suboptimal check (simplified, no errors possible)
      let isSubopt = false;
      try {
        if (k.o > 0) {
          const co = wpGetCityCoords(k.pl);
          if (co) {
            const dist = wpDistKm(HW.lat, HW.lon, co.la, co.lo);
            // OA check: OA marge = omzet * (1 - schouw - oa_pct)
            const oaM = k.o * (1 - CONFIG.schouw_commissie - CONFIG.oa_kostprijs_pct);
            // Eigen rough: omzet minus kosten
            const reisKm = dist * CONFIG.rijfactor * CONFIG.t_factor * 2;
            const reisK = reisKm * CONFIG.brandstof_per_km + (reisKm/CONFIG.snelheid)*CONFIG.uurtarief;
            const eigM = k.o * (1 - CONFIG.schouw_commissie) - 3*CONFIG.uurtarief - reisK - 2*CONFIG.loodstijd_uur*CONFIG.uurtarief;
            if (oaM > eigM + 50) isSubopt = true; // OA significantly better
            // Solo far trip
            const teamDayK = dayKlussen.filter(dk => dk.mw === k.mw);
            if (teamDayK.length === 1 && dist > 55) isSubopt = true;
          }
        }
      } catch(e) {}
      
      const subClass = isSubopt ? ' suboptimal' : '';
      
      barsHtml += `<div class="gantt-bar${subClass}" onclick="showKlusPopup(${klusIdx})" style="left:${left}%;width:${width}%;background:${bg};cursor:pointer;" title="${k.kl} · ${k.pl}${k.o ? ' · '+wpEur(k.o) : ''}">
        <span class="gb-plaats">${k.pl}</span>
        <span class="gb-info">${k.m2 ? k.m2+'m² ' : ''}${k.tp||''} ${k.o ? wpEur(k.o) : ''}</span>
      </div>`;
    });
    
    const shortName = person.split(' ').length > 2 
      ? person.split(' ')[0] + ' ' + person.split(' ')[person.split(' ').length-1]
      : person;
    const hasKlus = klussen.length > 0;
    const nameStyle = hasKlus ? 'color:#bbb;' : 'color:#444;';
    const icon = OA_LOCS.some(oa => oa.splandid === person) ? '🏢' : '👤';
    
    rowsHtml += `<tr>
      <td class="name-cell" title="${person}" style="${nameStyle}">${icon} ${shortName}</td>
      <td class="bar-cell" colspan="${HOURS + 1}">${barsHtml}</td>
    </tr>`;
  });
  
  main.innerHTML = `
    <div class="day-nav">
      <button class="week-nav-btn" id="dayPrevWeek">‹‹</button>
      <button class="week-nav-btn" id="dayPrev">‹</button>
      <div class="day-label">${dayName} ${currentDay.getDate()} ${WP_MONTHS[currentDay.getMonth()]} ${currentDay.getFullYear()}</div>
      <button class="week-nav-btn" id="dayNext">›</button>
      <button class="week-nav-btn" id="dayNextWeek">››</button>
      <div class="day-sub">${dayKlussen.length} klussen · ${filteredPersons.length} medewerkers · ${wpEur(dayOmzet)} omzet</div>
      <button class="week-nav-btn" id="dayToday" style="font-size:10px;width:auto;padding:0 12px;margin-left:auto;">Vandaag</button>
    </div>
    <div style="display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;">
      ${dayBtns}
    </div>
    <div class="gantt-wrap">
      <table class="gantt-table">
        <thead><tr>${hourHeaders}</tr></thead>
        <tbody>${rowsHtml}</tbody>
      </table>
    </div>
  `;

  // Day navigation events
  document.getElementById('dayPrev').addEventListener('click', () => { currentDay.setDate(currentDay.getDate() - 1); buildPlannerMain(); });
  document.getElementById('dayNext').addEventListener('click', () => { currentDay.setDate(currentDay.getDate() + 1); buildPlannerMain(); });
  document.getElementById('dayPrevWeek').addEventListener('click', () => { currentDay.setDate(currentDay.getDate() - 7); buildPlannerMain(); });
  document.getElementById('dayNextWeek').addEventListener('click', () => { currentDay.setDate(currentDay.getDate() + 7); buildPlannerMain(); });
  document.getElementById('dayToday').addEventListener('click', () => { currentDay = new Date(2026, 2, 6); buildPlannerMain(); });
  
  // Day button clicks
  document.querySelectorAll('.day-nav-btn[data-date]').forEach(btn => {
    btn.addEventListener('click', () => {
      currentDay = new Date(parseInt(btn.dataset.y), parseInt(btn.dataset.m), parseInt(btn.dataset.d));
      buildPlannerMain();
    });
  });
}
</script>

</body>
</html>
